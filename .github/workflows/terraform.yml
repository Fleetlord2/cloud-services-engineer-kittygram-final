name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Select Terraform action"
        required: true
        default: "plan"
        type: choice
        options:
          - plan
          - apply
          - destroy
jobs:
  terraform:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUB_KEY }}
      YC_CLOUD_ID: ${{ secrets.CLOUD_ID }}
      YC_FOLDER_ID: ${{ secrets.FOLDER_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4


      - name: Get IAM Token
        id: get-iam-token
        uses: docker://ghcr.io/yc-actions/yc-iam-token-fed:1.0.0
        with:
          yc-sa-id: ${{ secrets.YC_SA_ID }}

      - name: Export IAM Token
        env:
          TOKEN: ${{ steps.get-iam-token.outputs.token }}
        run: |
          echo "::add-mask::$TOKEN"
          echo "YC_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Install Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init        
        run: terraform init

      - name: Terraform Plan
        if: ${{ github.event.inputs.action == 'plan' }}
        run: terraform plan

      - name: Terraform Apply
        if: ${{ github.event.inputs.action == 'apply' }}
        run: terraform apply -auto-approve

      - name: Update HOST secret
        if: ${{ github.event.inputs.action == 'apply' }}
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          IP=$(terraform output -raw vm_ip)
          echo "VM IP: $IP"
          gh secret set HOST --body "$IP" --repo ${{ github.repository }}
          echo "HOST secret updated"

      - name: Terraform Destroy
        if: ${{ github.event.inputs.action == 'destroy' }}
        run: terraform destroy -auto-approve